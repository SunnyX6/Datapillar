# Datapillar API Gateway Production environment configuration

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: datapillar-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

logging:
  level:
    com.sunny.datapillar: INFO
    org.springframework: WARN
    root: INFO
  file:
    name: ${DATAPILLAR_LOG_DIR:./logs}/datapillar-gateway.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 5GB

# Routing configuration
gateway:
  routes:
    auth:
      url: http://${AUTH_HOST:localhost}:${AUTH_PORT:8082}
    studio:
      url: http://${STUDIO_HOST:localhost}:${STUDIO_PORT:8081}

security:
  authentication:
    enabled: true
    auth-token-cookie-name: ${AUTH_TOKEN_COOKIE_NAME:auth-token}
    issuer: ${AUTH_TOKEN_ISSUER:http://localhost:7001}
    audience: ${AUTH_AUDIENCE:datapillar-api}
    username-claim: preferred_username
    email-claim: email
