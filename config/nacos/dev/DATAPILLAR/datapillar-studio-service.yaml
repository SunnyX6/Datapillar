server:
  port: 7002
  address: ${SERVER_ADDRESS:0.0.0.0}
  servlet:
    context-path: /api/studio

spring:
  application:
    name: datapillar-studio-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:datapillar}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Sunny.123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initializationFailTimeout: -1
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      update-strategy: IGNORED

springdoc:
  use-fqn: true
  api-docs:
    enabled: true

# Actuator health check（Same port as service）
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    com.sunny.datapillar.studio: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.mybatis: WARN
    com.zaxxer.hikari: WARN
    org.springframework.data.redis: WARN
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_HOME:/tmp/datapillar-logs}/datapillar-studio-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

# Airflow Configuration
airflow:
  base-url: ${AIRFLOW_BASE_URL:http://localhost:8080}
  plugin-path: /plugins/datapillar
  username: ${AIRFLOW_USERNAME:datapillar}
  password: ${AIRFLOW_PASSWORD:123456asd}
  connect-timeout: 5000
  read-timeout: 30000

# Gravitino Configuration
gravitino:
  uri: ${GRAVITINO_URI:http://localhost:8090}
  metalake: ${GRAVITINO_METALAKE:OneMeta}

tenant:
  id-generator:
    worker-id: ${TENANT_ID_GENERATOR_WORKER_ID:1}

# SQL Execute configuration
sql:
  enabled: ${SQL_ENABLED:true}
  max-rows: ${SQL_MAX_ROWS:200}
  execution-timeout: ${SQL_TIMEOUT:300000}

# Security configuration
security:
  trusted-identity:
    enabled: true

datapillar:
  rpc:
    group: ${DUBBO_GROUP:datapillar}
    version: ${DUBBO_VERSION:1.0.0}

# Dubbo Configuration

dubbo:
  application:
    name: datapillar-studio-service
    qos-enable: ${DUBBO_QOS_ENABLE:false}
    qos-port: ${DUBBO_QOS_PORT:33333}
    register-mode: interface
    migration:
      step: FORCE_INTERFACE
    service-discovery:
      migration: FORCE_INTERFACE
  protocol:
    name: tri
    port: -1
  registry:
    address: nacos://${NACOS_SERVER_ADDR}
    group: ${NACOS_GROUP:DATAPILLAR}
    register-mode: interface
    parameters:
      namespace: ${NACOS_NAMESPACE}
      username: ${NACOS_USERNAME}
      password: ${NACOS_PASSWORD}
  consumer:
    check: ${DUBBO_CONSUMER_CHECK:false}
    cluster: ${DUBBO_CONSUMER_CLUSTER:failfast}
    retries: ${DUBBO_CONSUMER_RETRIES:0}
    timeout: ${DUBBO_CONSUMER_TIMEOUT:5000}
    parameters:
      migration.step: FORCE_INTERFACE
