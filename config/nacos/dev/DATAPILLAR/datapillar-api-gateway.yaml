server:
  port: ${SERVER_PORT:7000}

spring:
  application:
    name: datapillar-api-gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers:
              - "*"
            exposed-headers:
              - Authorization
              - Content-Disposition
              - X-Trace-Id
              - X-Request-Id
            allow-credentials: true
            max-age: 3600
      routes:
        - id: auth-docs
          uri: lb://datapillar-auth
          order: -10
          predicates:
            - Path=/api/auth/v3/api-docs,/api/auth/v3/api-docs/**

        - id: auth-service
          uri: lb://datapillar-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api(?<segment>/?.*), ${segment}

        - id: studio-docs
          uri: lb://datapillar-studio-service
          order: -10
          predicates:
            - Path=/api/studio/v3/api-docs,/api/studio/v3/api-docs/**

        - id: studio-setup
          uri: lb://datapillar-studio-service
          predicates:
            - Path=/api/studio/setup,/api/studio/setup/**

        - id: studio-health
          uri: lb://datapillar-studio-service
          order: -10
          predicates:
            - Path=/api/studio/actuator/health,/api/studio/actuator/health/**

        - id: studio-service
          uri: lb://datapillar-studio-service
          predicates:
            - Path=/api/studio/**

        - id: openapi-studio-service
          uri: lb://datapillar-studio-service
          predicates:
            - Path=/openapi/studio/**
          filters:
            - RewritePath=/openapi/studio(?<segment>/?.*), /api/studio${segment}

        - id: ai-service
          uri: lb://datapillar-ai
          predicates:
            - Path=/api/ai/**

        - id: openapi-ai-service
          uri: lb://datapillar-ai
          predicates:
            - Path=/openapi/ai/**
          filters:
            - RewritePath=/openapi/ai(?<segment>/?.*), /api/ai${segment}

        - id: openlineage-docs
          uri: lb://datapillar-openlineage
          order: -10
          predicates:
            - Path=/api/openlineage/v3/api-docs,/api/openlineage/v3/api-docs/**

        - id: openlineage-health
          uri: lb://datapillar-openlineage
          order: -10
          predicates:
            - Path=/api/openlineage/actuator/health,/api/openlineage/actuator/health/**

        - id: openlineage-service
          uri: lb://datapillar-openlineage
          predicates:
            - Path=/api/openlineage/**

        - id: openapi-openlineage-service
          uri: lb://datapillar-openlineage
          predicates:
            - Path=/openapi/openlineage/**
          filters:
            - RewritePath=/openapi/openlineage(?<segment>/?.*), /api/openlineage${segment}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

scalar:
  enabled: true
  path: /api/docs
  operation-title-source: path
  sources:
    - title: Auth API
      url: /api/auth/v3/api-docs
      default: true
    - title: Studio API
      url: /api/studio/v3/api-docs
    - title: AI API
      url: /api/ai/openapi.json
    - title: OpenLineage API
      url: /api/openlineage/v3/api-docs

security:
  require-https: false
  trusted-proxies:
    - 127.0.0.1/32
    - ::1/128
  authentication:
    enabled: true
    auth-token-cookie-name: auth-token
    issuer: ${AUTH_TOKEN_ISSUER:http://localhost:7001}
    audience: ${AUTH_AUDIENCE:datapillar-api}
    username-claim: preferred_username
    email-claim: email
    protected-path-prefixes:
      - /api/studio
      - /api/ai
      - /api/openlineage
      - /openapi/studio
      - /openapi/ai
      - /openapi/openlineage
    public-path-prefixes:
      - /api/auth
      - /api/studio/setup
      - /api/studio/actuator/health
      - /api/studio/v3/api-docs
      - /api/ai/openapi.json
      - /api/openlineage/actuator/health
      - /api/openlineage/v3/api-docs
      - /api/docs
  headers:
    enabled: true
    hsts-max-age-seconds: 31536000
    include-sub-domains: true

datapillar:
  rpc:
    group: ${DUBBO_GROUP:datapillar}
    version: ${DUBBO_VERSION:1.0.0}

dubbo:
  application:
    name: datapillar-api-gateway
    qos-enable: ${DUBBO_QOS_ENABLE:false}
    register-mode: interface
    migration:
      step: FORCE_INTERFACE
    service-discovery:
      migration: FORCE_INTERFACE
  protocol:
    name: tri
    port: -1
  registry:
    address: nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}
    group: ${NACOS_GROUP:DATAPILLAR}
    register-mode: interface
    parameters:
      namespace: ${NACOS_NAMESPACE:}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
  consumer:
    check: ${DUBBO_CONSUMER_CHECK:false}
    timeout: ${DUBBO_CONSUMER_TIMEOUT:3000}
    parameters:
      migration.step: FORCE_INTERFACE

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
    instances:
      auth-service:
        baseConfig: default
      studio-service:
        baseConfig: default
      ai-service:
        baseConfig: default
        slowCallDurationThreshold: 30s
      job-service:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s
    instances:
      ai-service:
        timeoutDuration: 60s

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
