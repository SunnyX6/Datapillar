server:
  port: 7002
  address: ${SERVER_ADDRESS:0.0.0.0}
  servlet:
    context-path: /api/studio

spring:
  application:
    name: datapillar-studio-service
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initializationFailTimeout: -1
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      update-strategy: IGNORED

springdoc:
  use-fqn: true
  api-docs:
    enabled: true

# Actuator health check（Same port as service）
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    com.sunny.datapillar.studio: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.mybatis: WARN
    com.zaxxer.hikari: WARN
    org.springframework.data.redis: WARN
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_HOME:/tmp/datapillar-logs}/datapillar-studio-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

airflow:
  endpoint: ${AIRFLOW_BASE_URL}
  plugin-path: /plugins/datapillar
  username: ${AIRFLOW_USERNAME}
  password: ${AIRFLOW_PASSWORD}
  connect-timeout-ms: 5000
  read-timeout-ms: 30000

gravitino:
  uri: ${GRAVITINO_URI}
  metalake: ${GRAVITINO_METALAKE}
  auth:
    type: ${GRAVITINO_AUTH_TYPE:simple}
    simple:
      user: ${GRAVITINO_SIMPLE_AUTH_USER:datapillar}
    oauth:
      server-uri: ${GRAVITINO_OAUTH_SERVER_URI:}
      token-path: ${GRAVITINO_OAUTH_TOKEN_PATH:}
      credential: ${GRAVITINO_OAUTH_CREDENTIAL:}
      scope: ${GRAVITINO_OAUTH_SCOPE:}
    kerberos:
      client-principal: ${GRAVITINO_KERBEROS_CLIENT_PRINCIPAL:}
      keytab-path: ${GRAVITINO_KERBEROS_KEYTAB_PATH:}
  connect-timeout-ms: 2000
  read-timeout-ms: 5000

tenant:
  id-generator:
    worker-id: ${TENANT_ID_GENERATOR_WORKER_ID}

# SQL Execute configuration
sql:
  enabled: ${SQL_ENABLED:true}
  max-rows: ${SQL_MAX_ROWS:200}
  execution-timeout: ${SQL_TIMEOUT:300000}

# Security configuration
security:
  trusted-identity:
    enabled: true
  key-storage:
    type: ${KEY_STORAGE_TYPE:local}
    local:
      path: ${KEY_STORAGE_LOCAL_PATH:/data/datapillar/privkeys}
    object:
      endpoint: ${KEY_STORAGE_OBJECT_ENDPOINT:}
      bucket: ${KEY_STORAGE_OBJECT_BUCKET:}
      access-key: ${KEY_STORAGE_OBJECT_ACCESS_KEY:}
      secret-key: ${KEY_STORAGE_OBJECT_SECRET_KEY:}
      region: ${KEY_STORAGE_OBJECT_REGION:}
      prefix: ${KEY_STORAGE_OBJECT_PREFIX:privkeys}
