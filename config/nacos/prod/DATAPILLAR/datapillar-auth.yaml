server:
  port: 7001
  address: ${SERVER_ADDRESS:0.0.0.0}
  servlet:
    context-path: /

spring:
  application:
    name: datapillar-auth
  datasource:
    # 使用与业务系统相同的数据库
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: AuthHikariCP
      max-lifetime: 900000
      connection-timeout: 10000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  # 认证服务只扫描 users 表的 Mapper
  mapper-locations: classpath*:/mapper/*Mapper.xml

springdoc:
  use-fqn: true
  api-docs:
    enabled: true

auth:
  authenticator: ${AUTH_AUTHENTICATOR:simple}
  token:
    issuer: ${AUTH_TOKEN_ISSUER:https://auth.datapillar.local}
    audience: ${AUTH_TOKEN_AUDIENCE:datapillar-api}
    keyset-path: ${AUTH_TOKEN_KEYSET_PATH}
    access-ttl-seconds: ${AUTH_TOKEN_ACCESS_TTL_SECONDS:3600}
    refresh-ttl-seconds: ${AUTH_TOKEN_REFRESH_TTL_SECONDS:604800}
    refresh-remember-ttl-seconds: ${AUTH_TOKEN_REFRESH_REMEMBER_TTL_SECONDS:2592000}
    login-ttl-seconds: ${AUTH_TOKEN_LOGIN_TTL_SECONDS:300}
  # Configure oauth2 only when auth.authenticator=oauth2.
  # oauth2:
  #   provider: ${AUTH_OAUTH2_PROVIDER:generic}
  #   authority: ${AUTH_OAUTH2_AUTHORITY:https://idp.example.com}
  #   jwks-uri: ${AUTH_OAUTH2_JWKS_URI:https://idp.example.com/.well-known/jwks.json}
  #   principal-fields:
  #     - preferred_username
  #     - email
  #     - sub
  #   static-public-key-path: ${AUTH_OAUTH2_STATIC_PUBLIC_KEY_PATH:}

# Cookie 配置
cookie:
  secure: true

# 安全配置（严格模式）
security:
  trusted-proxies:
    - ${TRUSTED_PROXY_CIDR_1:}
  csrf:
    enabled: true
    header-name: X-CSRF-Token
    cookie-name: csrf-token
    refresh-header-name: X-Refresh-CSRF-Token
    refresh-cookie-name: refresh-csrf-token
    ttl-seconds: ${AUTH_TOKEN_ACCESS_TTL_SECONDS:3600}
  login:
    enabled: true
    max-attempts: 5
    window-seconds: 600
    lock-seconds: 900
  password:
    argon2:
      salt-length: 16
      hash-length: 32
      parallelism: 1
      memory-mb: 64
      iterations: 3

# SSO 配置
sso:
  state-bytes: ${SSO_STATE_BYTES:24}  # state 随机字节数（至少16）
  state-ttl-seconds: ${SSO_STATE_TTL_SECONDS:300}  # 5分钟

# Actuator 健康检查（与服务同端口）
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    com.sunny.datapillar.auth: INFO
    org.springframework.security: WARN
    org.mybatis: WARN
    com.zaxxer.hikari: WARN
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_HOME:/tmp/datapillar-logs}/datapillar-auth.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
