server:
  port: 7000
  address: ${SERVER_ADDRESS:0.0.0.0}
  forward-headers-strategy: framework

spring:
  application:
    name: datapillar-api-gateway

  cloud:
    gateway:
      server:
        webflux:
          # overall situation CORS Configuration
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - https://REPLACE_ME
                allowedMethods:
                  - GET
                  - POST
                  - PATCH
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

          # Default filter
          default-filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
                deny-empty-key: false

          # Routing configuration（All go to service discovery）
          routes:
            # 1. Authentication services OpenAPI Documentation (datapillar-auth)
            # rewrite: /api/auth/v3/api-docs/** → /v3/api-docs/**
            - id: auth-docs
              uri: lb://datapillar-auth
              order: -10
              predicates:
                - Path=/api/auth/v3/api-docs,/api/auth/v3/api-docs/**
              filters:
                - RewritePath=/api/auth/v3/api-docs(?<segment>/?.*), /v3/api-docs${segment}

            # 2. Authentication services (datapillar-auth)
            # rewrite: /api/auth/** → /auth/**
            - id: auth-service
              uri: lb://datapillar-auth
              predicates:
                - Path=/api/auth/**
              filters:
                - RewritePath=/api(?<segment>/?.*), ${segment}

            # 3. Studio OpenAPI Documentation
            - id: studio-docs
              uri: lb://datapillar-studio-service
              order: -10
              predicates:
                - Path=/api/studio/v3/api-docs,/api/studio/v3/api-docs/**

            # 4. Studio Initialization interface（No need to log in before initialization）
            - id: studio-setup
              uri: lb://datapillar-studio-service
              predicates:
                - Path=/api/studio/setup,/api/studio/setup/**

            # 5. Studio Health check interface（No login required）
            - id: studio-health
              uri: lb://datapillar-studio-service
              order: -10
              predicates:
                - Path=/api/studio/actuator/health,/api/studio/actuator/health/**

            # 6. Studio Business interface（protected）
            - id: studio-service
              uri: lb://datapillar-studio-service
              predicates:
                - Path=/api/studio/**

            # 7. AI Business interface（protected）
            - id: ai-service
              uri: lb://datapillar-ai
              predicates:
                - Path=/api/ai/**

            # 8. OpenLineage OpenAPI Documentation
            - id: openlineage-docs
              uri: lb://datapillar-openlineage
              order: -10
              predicates:
                - Path=/api/openlineage/v3/api-docs,/api/openlineage/v3/api-docs/**

            # 9. OpenLineage Health check interface（No login required）
            - id: openlineage-health
              uri: lb://datapillar-openlineage
              order: -10
              predicates:
                - Path=/api/openlineage/actuator/health,/api/openlineage/actuator/health/**

            # 10. OpenLineage Business interface（protected）
            - id: openlineage-service
              uri: lb://datapillar-openlineage
              predicates:
                - Path=/api/openlineage/**

  # Redis Configuration（used to limit current）
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}

scalar:
  enabled: true
  path: /api/docs
  operation-title-source: path
  sources:
    - title: Auth API
      url: /api/auth/v3/api-docs
      default: true
    - title: Studio API
      url: /api/studio/v3/api-docs
    - title: Studio Governance API
      url: /api/studio/v3/api-docs/governance
    - title: AI API
      url: /api/ai/openapi.json
    - title: OpenLineage API
      url: /api/openlineage/v3/api-docs

# Security configuration（strict mode）
security:
  require-https: true
  trusted-proxies:
    - ${TRUSTED_PROXY_CIDR_1:}
  authentication:
    enabled: true
    auth-token-cookie-name: auth-token
    issuer: ${AUTH_TOKEN_ISSUER:https://auth.datapillar.local}
    audience: ${AUTH_AUDIENCE:datapillar-api}
    username-claim: preferred_username
    email-claim: email
    protected-path-prefixes:
      - /api/studio
      - /api/ai
      - /api/openlineage
    public-path-prefixes:
      - /api/auth
      - /api/studio/setup
      - /api/studio/actuator/health
      - /api/studio/v3/api-docs
      - /api/ai/openapi.json
      - /api/openlineage/actuator/health
      - /api/openlineage/v3/api-docs
      - /api/docs
  headers:
    enabled: true
    hsts-max-age-seconds: 31536000
    include-sub-domains: true

datapillar:
  rpc:
    group: ${DUBBO_GROUP:datapillar}
    version: ${DUBBO_VERSION:1.0.0}

dubbo:
  application:
    name: datapillar-api-gateway
    qos-enable: ${DUBBO_QOS_ENABLE:false}
    register-mode: interface
    migration:
      step: FORCE_INTERFACE
    service-discovery:
      migration: FORCE_INTERFACE
  protocol:
    name: tri
    port: -1
  registry:
    address: nacos://${NACOS_SERVER_ADDR}
    group: ${NACOS_GROUP:DATAPILLAR}
    register-mode: interface
    parameters:
      namespace: ${NACOS_NAMESPACE}
      username: ${NACOS_USERNAME}
      password: ${NACOS_PASSWORD}
  consumer:
    check: ${DUBBO_CONSUMER_CHECK:false}
    timeout: ${DUBBO_CONSUMER_TIMEOUT:3000}
    parameters:
      migration.step: FORCE_INTERFACE

# Resilience4j circuit breaker configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 5
    instances:
      auth-service:
        baseConfig: default
      studio-service:
        baseConfig: default
      ai-service:
        baseConfig: default
        # AI Service timeout is longer
        slowCallDurationThreshold: 30s
      job-service:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 10s
    instances:
      ai-service:
        timeoutDuration: 60s

# Actuator health check（Same port as service）
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
    com.sunny.datapillar.gateway: DEBUG
    io.netty.resolver.dns: WARN
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_HOME:/tmp/datapillar-logs}/datapillar-api-gateway.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
